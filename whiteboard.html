<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="content-language" content="en">
  <meta http-equiv="x-ua-compatible" content="IE=edge">
  <title>Whiteboard Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Uniworker">
  <meta name="keywords" content="painter, online, drawing, line, graphics, sketching, writing, geometry, 2d">
  <meta name="description" content="free drawing lightweight web page for simple usage">
  <meta name="theme-color" content="#0a0a0a">
  <meta property="og:locale" content="en">
  <meta property="og:title" content="Whiteboard Online">
  <meta property="og:type" content="online service">
  <meta property="og:url" content="https://uniworker.github.io/painteronline/">
  <meta property="og:image" content="tile-wide.png">
  <meta property="og:image:width" content="558" />
  <meta property="og:image:height" content="270" />
  <meta property="og:site_name" content="Whiteboard Online">
  <link type="image/x-icon" href="favicon.ico" />
  <link href="https://cdn.linearicons.com/free/1.0.0/icon-font.min.css" rel="stylesheet">
  <link href="css/style.min.css" rel="stylesheet">
  <link href="css/main.min.css" rel="stylesheet">
  <link href="css/media.min.css" rel="stylesheet">
  <script src="js/vendors/particles.min.js" defer></script>
  <script src="js/whiteboard.js" defer></script>
</head>

<body class="m-0 min-w-80 overflow-hidden" style="font-family: 'Space Grotesk', sans-serif;">
  <div id="particles" class="fixed inset-0 h-full w-full"></div>
  <div class="flex items-center justify-center h-dvh overflow-hidden" style="background: radial-gradient(circle, #111 20%, #000 80%) no-repeat;">
    <div class="flex flex-col items-center justify-center w-full mx-8">
        <header class="flex justify-between items-center w-full">
            <div class="w-1/3">
                <a id="homeback" class="relative inline-block text-gray-500 z-20" href="index.html" title="Back home"
                    style="text-shadow: 0 0 3px rgb(100, 100, 100);"><span class="lnr lnr-home"></span></a>
            </div>
            <div class="w-1/3">
                <h1 class="text-gray-600 text-center text-3xl uppercase tracking-wider select-none"
                    style="text-shadow: 0 0 3px rgb(100, 100, 100);"><a href="index.html" title="Back home">Whiteboard ✏️ Online</a></h1>
                <p class="text-gray-500 text-center text-sm select-none" style="text-shadow: 0 0 3px rgb(100, 100, 100);">Unleash your imagination for study and art</p>
            </div>
            <div class="w-1/3">
                <p class="sr-only">Empty line</p>
            </div>
        </header>
        <main class="whiteboard relative flex flex-col items-center justify-center gap-8" style="min-height: 85dvh;">
            <section class="absolute">
                <canvas class="relative bg-transparent cursor-crosshair" id="canvas"></canvas>
            </section>
            <section class="absolute left-150 flex flex-col items-center gap-4">
                <div class="relative -top-15 rotate-270" style="--thickness: 4;">
                    <div class="thumbs">
                        <input class="appearance-none bg-none outline-0" id="resizer" type="range" min="1" max="10" value="4" step="1">
                    </div>
                </div>
                <div class="relative mx-auto rounded-2xl text-center z-10 glass">
                    <button class="block border-0 outline-0 rounded-[50%] my-4 mx-2 h-6 w-6 cursor-pointer" data-color="white"></button>
                    <button class="block border-0 outline-0 rounded-[50%] my-4 mx-2 h-6 w-6 cursor-pointer" data-color="red"></button>
                    <button class="block border-0 outline-0 rounded-[50%] my-4 mx-2 h-6 w-6 cursor-pointer" data-color="green"></button>
                    <button class="block border-0 outline-0 rounded-[50%] my-4 mx-2 h-6 w-6 cursor-pointer" data-color="blue"></button>
                    <button class="block border-0 outline-0 rounded-[50%] my-4 mx-2 h-6 w-6 cursor-pointer"
                        data-color="orange"></button>
                    <button class="block border-0 outline-0 rounded-[50%] my-4 mx-2 h-6 w-6 cursor-pointer"
                        data-color="magenta"></button>
                </div>
                <div class="relative p-1 z-10">
                    <button class="text-gray-500 cursor-pointer outline-0" style="text-shadow: 0 0 3px rgb(100, 100, 100);" title="Clean all" id="cleaner">
                        <span class="lnr lnr-trash"></span>
                    </button>
                </div>
            </section>
        </main>
        <footer class="items-center">
            <p class="relative text-base uppercase"><span class="text-gray-600">©2026 | Created by </span><a
                    class="inline-block bg-gradient-to-r from-red-500 to-yellow-500 bg-clip-text text-transparent"
                    href="https://www.youtube.com/channel/UC-ii73NUvqnJhGpieMlMstQ" target="_blank"
                    title="Follow me">UNIWORKER</a>
            </p>
        </footer>
    </div>
  </div>
  <script>
    window.ga = function () { ga.q.push(arguments) }; ga.q = []; ga.l = +new Date;
    ga('create', 'UA-XXXXX-Y', 'auto'); ga('set', 'anonymizeIp', true); ga('set', 'transport', 'beacon'); ga('send', 'pageview')
  </script>
  <script src="https://www.google-analytics.com/analytics.js" async></script>
</body>

</html>
